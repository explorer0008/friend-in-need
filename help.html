<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Request Help</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar">
  <strong>Friend In Need</strong>
  <nav><a href="home.html">Home</a><button id="logoutBtn" class="ghost">Logout</button></nav>
</header>

<main class="form-shell">
  <section class="panel form-panel">
    <h1>Request Help</h1>
    <p>Your request is stored in the browser database and shown on the home page.</p>
    <form id="helpForm">
      <div class="grid-2">
        <input id="requestName" placeholder="Name" required>
        <input id="requestPhone" type="tel" placeholder="Phone number" required>
      </div>
      <div class="location-row">
        <input id="requestLocation" placeholder="Location or hospital" required>
        <button type="button" id="gpsBtn" class="secondary">GPS</button>
      </div>
      <select id="emergency" required>
        <option value="">Emergency type</option>
        <option>Health Issue</option>
        <option>Stuck Somewhere</option>
        <option>Food / Shelter</option>
        <option>Blood Needed</option>
        <option>Other</option>
      </select>
      <textarea id="details" rows="4" placeholder="Extra details"></textarea>
      <button>Submit Request</button>
      <a class="back-link" href="home.html">Back to home</a>
    </form>
    <p id="message" class="message"></p>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
