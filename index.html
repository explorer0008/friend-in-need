<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Friend In Need - Sign Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Friend In Need</h1>
    <p>Create an account to request and offer emergency help nearby.</p>
    <form id="signupForm">
      <div class="grid-2">
        <input id="name" placeholder="Full name" required>
        <input id="phone" type="tel" placeholder="Phone" required>
      </div>
      <input id="email" type="email" placeholder="Email" required>
      <div class="grid-2">
        <input id="password" type="password" placeholder="Password" minlength="4" required>
        <input id="confirmPassword" type="password" placeholder="Confirm password" required>
      </div>
      <button>Sign Up</button>
    </form>
    <p class="switch">Already have an account? <a href="login.html">Login</a></p>
    <p id="message" class="message"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
