<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Friend In Need - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Welcome Back</h1>
    <p>Login with your email or phone number.</p>
    <form id="loginForm">
      <input id="identifier" placeholder="Email or phone" required>
      <input id="loginPassword" type="password" placeholder="Password" required>
      <button>Login</button>
    </form>
    <p class="switch">New here? <a href="index.html">Create account</a></p>
    <p id="message" class="message"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
